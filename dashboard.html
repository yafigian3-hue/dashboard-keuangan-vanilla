<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen flex text-gray-800"
  >
    <!-- SIDEBAR -->
    <aside
      id="sidebar"
      class="fixed top-0 left-0 h-screen w-64 bg-white/80 backdrop-blur-xl border-r border-white/20 p-6 z-50 -translate-x-full transition-transform duration-300 md:translate-x-0"
    >
      <div class="flex items-center gap-3 mb-10">
        <div
          class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-200"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            class="w-5 h-5 text-white"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 10.5L12 4l9 6.5v8A1.5 1.5 0 0119.5 20h-15A1.5 1.5 0 013 18.5v-8z"
            />
          </svg>
        </div>

        <div>
          <p class="text-lg font-bold tracking-tight text-gray-800">Keuangan</p>

          <span
            class="text-xs tracking-[0.2em] uppercase text-gray-400 font-semibold"
          >
            Dashboard
          </span>
        </div>
      </div>

      <nav class="space-y-2">
        <a
          href="dashboard.html"
          class="nav-link flex items-center gap-3 px-4 py-3 rounded-2xl font-medium text-gray-600 hover:bg-gray-100 transition-all duration-300"
        >
          Dashboard
        </a>

        <a
          href="transaksi.html"
          class="nav-link flex items-center gap-3 px-4 py-3 rounded-2xl font-medium text-gray-600 hover:bg-gray-100 transition-all duration-300"
        >
          Transaksi
        </a>

        <hr class="my-4 border-gray-100" />

        <button
          id="logoutBtn"
          class="w-full text-left px-4 py-3 rounded-2xl text-red-500 font-medium hover:bg-red-50 transition-all duration-300"
        >
          Logout
        </button>
      </nav>
    </aside>

    <main class="flex-1 p-6 md:ml-64 w-full overflow-hidden">
      <button
        id="toggleSidebar"
        class="md:hidden mb-6 px-4 py-2.5 bg-white rounded-xl border border-gray-100 shadow-sm"
      >
        ☰ Menu
      </button>

      <div
        id="overlay"
        class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"
      ></div>

      <!-- HEADER -->
      <div
        class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-8"
      >
        <div>
          <div class="flex items-center gap-4">
            <div>
              <h1 class="text-3xl font-bold text-gray-800">Selamat Datang</h1>

              <p class="text-gray-500 mt-1">
                Kelola pemasukan dan pengeluaranmu dengan mudah
              </p>
            </div>
          </div>
        </div>

        <div
          class="hidden md:flex items-center gap-3 bg-white px-4 py-2 rounded-2xl shadow-sm border border-gray-100"
        >
          <div
            class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold"
          >
            Y
          </div>

          <div>
            <p class="text-sm font-semibold">Yafi Gian</p>
            <p class="text-xs text-gray-400">Personal Account</p>
          </div>
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="space-y-5 mb-8">
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-5">
          <div
            class="col-span-2 md:col-span-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-5 rounded-3xl shadow-lg overflow-hidden"
          >
            <div class="flex justify-between items-center gap-4">
              <div class="min-w-0">
                <p class="text-blue-100 text-sm font-semibold">Total Saldo</p>
                <p
                  id="balance"
                  class="text-2xl sm:text-3xl font-bold mt-1 break-words truncate"
                >
                  Rp0
                </p>
              </div>
              <div
                class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center flex-shrink-0"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.8"
                  stroke="currentColor"
                  class="w-6 h-6 text-white"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 12V7.5A2.5 2.5 0 0018.5 5h-13A2.5 2.5 0 003 7.5v9A2.5 2.5 0 005.5 19h13a2.5 2.5 0 002.5-2.5V12zm0 0h-4.5a1.5 1.5 0 100 3H21"
                  />
                </svg>
              </div>
            </div>
          </div>

          <div
            class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm min-w-0"
          >
            <div class="flex justify-between items-center mb-3">
              <p class="text-sm font-semibold text-gray-500">Pemasukan</p>
              <div
                class="w-10 h-10 rounded-xl bg-green-100 flex items-center justify-center flex-shrink-0"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.8"
                  stroke="currentColor"
                  class="w-5 h-5 text-green-600"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M2.25 18L9 11.25l4.5 4.5L21.75 7.5"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16.5 7.5h5.25v5.25"
                  />
                </svg>
              </div>
            </div>
            <p
              id="totalIncome"
              class="text-2xl sm:text-3xl font-bold mt-1 text-gray-800 break-words truncate"
            >
              Rp0
            </p>
          </div>

          <div
            class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm min-w-0"
          >
            <div class="flex justify-between items-center mb-3">
              <p class="text-sm font-semibold text-gray-500">Pengeluaran</p>
              <div
                class="w-10 h-10 rounded-xl bg-red-100 flex items-center justify-center flex-shrink-0"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.8"
                  stroke="currentColor"
                  class="w-5 h-5 text-red-600"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 14h6m-6-4h6m2 10l-2-1.5L13 20l-2-1.5L9 20l-2-1.5L5 20V4l2 1.5L9 4l2 1.5L13 4l2 1.5L17 4v16z"
                  />
                </svg>
              </div>
            </div>
            <p
              id="totalExpense"
              class="text-2xl sm:text-3xl font-bold mt-1 text-gray-800 break-words truncate"
            >
              Rp0
            </p>
          </div>
        </div>
      </div>
      <!-- CHART -->
      <div
        class="bg-white/90 backdrop-blur-sm p-6 rounded-3xl border border-gray-100 shadow-sm w-full overflow-hidden"
      >
        <h3 class="text-xl font-bold mb-6">Ringkasan Keuangan</h3>
        <div class="h-64 w-full relative">
          <canvas id="financeChart" class="w-full h-full"></canvas>
        </div>
        <ul id="transactionList" class="space-y-3 pt-2"></ul>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/format.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/transaksi.js"></script>
    <script src="js/ui.js"></script>
  </body>
</html>
