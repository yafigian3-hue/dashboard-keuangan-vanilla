<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaksi</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen flex text-gray-800"
  >
    <!-- SIDEBAR -->
    <aside
      id="sidebar"
      class="fixed top-0 left-0 h-full w-72 bg-white/80 backdrop-blur-xl border-r border-white/20 p-6 z-50 -translate-x-full transition-transform duration-300 md:translate-x-0 md:relative"
    >
      <div class="flex items-center gap-3 mb-10">
        <div
          class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-200"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            class="w-5 h-5 text-white"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 10.5L12 4l9 6.5v8A1.5 1.5 0 0119.5 20h-15A1.5 1.5 0 013 18.5v-8z"
            />
          </svg>
        </div>

        <div>
          <p class="text-lg font-bold tracking-tight text-gray-800">Keuangan</p>

          <span
            class="text-xs tracking-[0.2em] uppercase text-gray-400 font-semibold"
          >
            Dashboard
          </span>
        </div>
      </div>

      <nav class="space-y-2">
        <a
          href="dashboard.html"
          class="nav-link flex items-center gap-3 px-4 py-3 rounded-2xl font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-all duration-300"
        >
          Dashboard
        </a>

        <a
          href="transaksi.html"
          class="nav-link flex items-center gap-3 px-4 py-3 rounded-2xl font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-all duration-300"
        >
          Transaksi
        </a>

        <hr class="my-4 border-gray-100" />

        <button
          id="logoutBtn"
          class="w-full text-left px-4 py-3 rounded-2xl text-red-500 font-medium hover:bg-red-50 transition-all duration-300"
        >
          Logout
        </button>
      </nav>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 p-6 w-full">
      <!-- MOBILE BUTTON -->
      <button
        id="toggleSidebar"
        class="md:hidden mb-4 px-4 py-2 bg-white rounded-xl shadow-sm border border-gray-100"
      >
        ☰ Menu
      </button>

      <div
        id="overlay"
        class="fixed inset-0 bg-black/40 hidden z-40 md:hidden"
      ></div>

      <!-- HEADER -->
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-gray-800">
            Transaksi
          </h1>

          <p class="text-gray-500 mt-1">
            Kelola semua pemasukan dan pengeluaranmu
          </p>
        </div>

        <!-- PROFILE -->
        <div
          class="hidden md:flex items-center gap-3 bg-white px-4 py-2 rounded-2xl shadow-sm border border-gray-100"
        >
          <div
            class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold"
          >
            Y
          </div>

          <div>
            <p class="text-sm font-semibold">Yafi Gian</p>
            <p class="text-xs text-gray-400">Personal Account</p>
          </div>
        </div>
      </div>

      <!-- CARD -->
      <div
        class="bg-white p-8 rounded-3xl shadow-[0_10px_30px_rgba(0,0,0,0.05)] border border-gray-100 space-y-8"
      >
        <!-- FORM -->
        <form
          id="transactionForm"
          class="grid grid-cols-1 md:grid-cols-4 gap-4"
        >
          <input
            id="name"
            placeholder="Nama transaksi"
            class="bg-gray-50 border border-gray-200 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none p-3 rounded-2xl transition-all duration-300"
            required
          />

          <input
            id="amount"
            type="number"
            placeholder="Jumlah uang"
            class="bg-gray-50 border border-gray-200 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none p-3 rounded-2xl transition-all duration-300"
            required
          />

          <select
            id="type"
            class="bg-gray-50 border border-gray-200 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none p-3 rounded-2xl transition-all duration-300"
          >
            <option value="income">Pemasukan</option>
            <option value="expense">Pengeluaran</option>
          </select>

          <button
            type="submit"
            class="px-4 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:scale-[1.02] text-white font-semibold rounded-2xl transition-all duration-300 shadow-lg shadow-blue-200"
          >
            Tambah
          </button>
        </form>

        <!-- FILTER -->
        <div class="flex items-center gap-2">
          <!-- Filter -->
          <div class="flex flex-1 gap-2">
            <button
              id="tabAll"
              class="flex-1 py-2.5 rounded-2xl bg-blue-600 text-white text-xs font-semibold shadow-md shadow-blue-200 transition-all duration-300"
            >
              Semua
            </button>

            <button
              id="tabIncome"
              class="flex-1 py-2.5 rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold transition-all duration-300"
            >
              Masuk
            </button>

            <button
              id="tabExpense"
              class="flex-1 py-2.5 rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold transition-all duration-300"
            >
              Keluar
            </button>
          </div>

          <!-- Search -->
          <button
            id="searchBtn"
            class="w-11 h-11 flex items-center justify-center rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-700 transition-all duration-300"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-4.35-4.35m0 0A7.95 7.95 0 1 0 5.4 5.4a7.95 7.95 0 0 0 11.25 11.25Z"
              />
            </svg>
          </button>
        </div>

        <input
          id="searchInput"
          type="text"
          placeholder="Cari transaksi..."
          class="hidden mt-3 w-full p-3 rounded-2xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500"
        />

        <!-- LIST -->
        <ul id="transactionList" class="space-y-4"></ul>
      </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/format.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/transaksi.js"></script>
    <script src="js/ui.js"></script>
  </body>
</html>
